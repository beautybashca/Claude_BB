# ============================================================
# BEAUTY BASH — Decap CMS Configuration
# ============================================================
# !! CMS SCHEMA FLAG !!
# The testimonials collection has a new optional field: location.
# After uploading this file, trigger a Netlify redeploy so the
# CMS picks up the schema change. Steps:
#   1. Upload this file to admin/config.yml in GitHub
#   2. Go to Netlify → Deploys → confirm green deploy
#   3. Log into beautybash.ca/admin → Site Content → Testimonials
#   4. You will now see a "Location" field on each testimonial entry
#
# IMPORTANT: Replace YOUR-GITHUB-USERNAME below with your actual
# GitHub username if it has been reset.
# ============================================================

backend:
  name: git-gateway
  repo: YOUR-GITHUB-USERNAME/beauty-bash-website
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_data"
    label: "Site Content"
    files:

      # ----------------------------------------------------------
      # TESTIMONIALS
      # Saves to: data/testimonials.json
      # Rendered on: index.html (carousel), testimonials.html (grid)
      #
      # CHANGED: Added optional "location" field.
      # It is marked required: false so existing testimonials
      # without a location will not break — location renders
      # only when the field has a value.
      # ----------------------------------------------------------
      - label: "Testimonials"
        name: "testimonials"
        file: "data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.service}}"
            fields:
              - { label: "Client Name",   name: "name",    widget: "string" }
              - { label: "Service Type",  name: "service", widget: "string",
                  hint: "e.g. Bridal, Event Styling, Corporate" }
              - { label: "Year",          name: "year",    widget: "string",
                  hint: "e.g. 2024" }
              - { label: "Quote",         name: "quote",   widget: "text",
                  hint: "Do not include quotation marks — added automatically" }
              # ADDED: optional location field
              - label: "Location (optional)"
                name: "location"
                widget: "string"
                required: false
                hint: "City or region, e.g. Vancouver, BC — leave blank to omit"

      # ----------------------------------------------------------
      # GALLERY PHOTOS — unchanged
      # ----------------------------------------------------------
      - label: "Gallery Photos"
        name: "gallery"
        file: "data/gallery.json"
        fields:
          - label: "Photos"
            name: "items"
            widget: "list"
            summary: "{{fields.tag}}"
            fields:
              - { label: "Photo",           name: "image",  widget: "image",
                  hint: "Compress to under 300KB first — use squoosh.app" }
              - { label: "Caption / Tag",   name: "tag",    widget: "string",
                  hint: "e.g. Bridal · Full Look" }
              - { label: "Alt Text (SEO)",  name: "alt",    widget: "string",
                  hint: "Describe the photo, e.g. Bridal updo by Beauty Bash Vancouver" }

      # ----------------------------------------------------------
      # SERVICES — unchanged
      # ----------------------------------------------------------
      - label: "Services"
        name: "services"
        file: "data/services.json"
        fields:
          - label: "Services"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Service Name",        name: "title",       widget: "string" }
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Person (Bridal)",       value: "bridal" }
                  - { label: "Star (Events)",          value: "events" }
                  - { label: "Camera (Photography)",   value: "photography" }
                  - { label: "Briefcase (Corporate)",  value: "corporate" }
                  - { label: "Location Pin (Maternity)", value: "maternity" }
              - { label: "Description",         name: "description", widget: "text" }
              - { label: "Photo (optional)",    name: "image",       widget: "image",
                  required: false }

      # ----------------------------------------------------------
      # Token IG — 20260324
      # ----------------------------------------------------------
      - label: "Social Media Settings"
        name: "social"
        file: "data/settings.json"
        fields:
            - {label: "Instagram Access Token", name: "insta_token", widget: "string"}
